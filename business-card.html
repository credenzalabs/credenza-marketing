<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credenza Business Card</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
<link rel="stylesheet" href="https://use.typekit.net/vqm2hhx.css">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e6df;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    font-family: 'Inter', sans-serif;
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 8px;
  }

  /* Standard US business card: 3.5 x 2 inches at 300dpi = 1050x600 */
  /* Displaying at 2x for screen clarity */
  .card {
    width: 700px;
    height: 400px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  }

  /* ─── FRONT ─── */
  .card-front {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 52px;
    height: 100%;
  }

  .card-front .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-front .logo-text {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #2c2c2c;
  }

  .card-front .tagline {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: 11.5px;
    color: #8a8960;
    letter-spacing: -0.01em;
    text-align: right;
    line-height: 1.4;
  }

  .card-front .divider {
    width: 100%;
    height: 1px;
    background: #c8c5b8;
  }

  .card-front .info {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .card-front .name {
    font-family: 'freight-display-pro', Georgia, serif;
    font-size: 34px;
    color: #2c2c2c;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .card-front .title {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8a8960;
    font-weight: 500;
  }

  .card-front .contact {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-front .contact span {
    font-family: 'Inter', sans-serif;
    font-size: 15.5px;
    color: #555;
    letter-spacing: 0.02em;
  }

  /* ─── BACK ─── */
  .card-back {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    background: #b8ccd2;
    position: relative;
  }

  .card-back .dot-pattern {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(184,204,210,0.12) 1px, transparent 1px);
    background-size: 24px 24px;
  }

  .card-back .center {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .card-back .logo-mark {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #b8ccd2;
  }

  .card-back .rule {
    width: 40px;
    height: 1px;
    background: rgba(184,204,210,0.3);
  }

  .card-back .url {
    font-family: 'Inter', sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(184,204,210,0.5);
  }

  /* Accent stripe */
  .card-front::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #b8ccd2;
  }

  .card-back::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #b8ccd2;
  }
</style>
</head>
<body>

<div class="label">Front</div>
<div class="card">
  <div class="card-front">
    <div class="top">
      <img src="public/brandmark.svg" alt="Credenza" style="height: 38px; width: auto;">
      <div style="font-family: 'freight-display-pro', Georgia, serif; font-style: italic; font-size: 16px; color: #8a8960; text-align: right; line-height: 1.3; align-self: center;">The standard for trade programs.</div>
    </div>
    <div class="info">
      <div>
        <div class="name">Julia Atwater</div>
        <div class="title">Founder & CEO</div>
      </div>
      <div class="contact">
        <span>julia@usecredenza.com</span>
        <span>561.223.9125</span>
        <span>usecredenza.com</span>
      </div>
    </div>
  </div>
</div>

<div class="label">Back</div>
<div class="card">
  <div class="card-back">
    <div class="center">
      <img src="https://d2xsxph8kpxj0f.cloudfront.net/310519663400666768/au946vH5rjwmQAZ5wCBePX/CredenzaLogo_transparent_e1d9cbc2.png" alt="Credenza" style="height: 64px; width: auto; margin-top: -16px;">
    </div>
  </div>
</div>

</body>
</html>
