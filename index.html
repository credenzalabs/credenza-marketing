    <script type="application/ld+json">

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Credenza?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Credenza is the verified identity platform for interior design's trade market. Designers create one verified trade profile to apply across every participating brand, manage every trade account in one dashboard, and generate compliant resale certificates in seconds. Vendors get automated trade verification, configurable approval rules, and a resale certificate engine that eliminates manual review and protects them in an audit."
          }
        },
        {
          "@type": "Question",
          "name": "Are you the Credenza that does Web3 or sports?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Credenza Labs, Inc. is a software platform for the interior design industry. We are unrelated to other companies sharing the Credenza name."
          }
        },
        {
          "@type": "Question",
          "name": "Is Credenza a marketplace?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. We're infrastructure—not a marketplace. Credenza is built to empower your trade relationships, not intercept them. Designers source from the brands they choose; vendors keep their direct relationships with their trade buyers."
          }
        },
        {
          "@type": "Question",
          "name": "How is Credenza different from Shopify Plus B2B?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Credenza complements your commerce stack rather than replacing it. Shopify Plus B2B handles trade pricing and tax-exempt checkout once a buyer is approved—Credenza is the identity, verification, and compliance layer that gets buyers approved in the first place."
          }
        },
        {
          "@type": "Question",
          "name": "How is Credenza priced?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Designers use Credenza free—no credit card, no trial window, no seat limit. Vendor pricing is a monthly subscription, tiered based on the volume of applications and certificates processed and the features included. We don't take a percentage of sales, transactions, or designer spend."
          }
        },
        {
          "@type": "Question",
          "name": "Is Credenza live today?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes for designers—the platform is live and free to use today. To-the-trade brands are joining now ahead of public launch."
          }
        }
      ]
