    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        ad_storage: 'granted',
        ad_user_data: 'granted',
        ad_personalization: 'granted',
        analytics_storage: 'granted'
      });
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        wait_for_update: 500,
        region: [
          'US-CA','US-CO','US-CT','US-UT','US-VA','US-TX','US-OR',
          'US-MT','US-IA','US-DE','US-NH','US-NJ','US-TN',
          'GB','AT','BE','BG','HR','CY','CZ','DK','EE','FI','FR',
          'DE','GR','HU','IS','IE','IT','LV','LI','LT','LU','MT',
          'NL','NO','PL','PT','RO','SK','SI','ES','SE',
          'BR','CA'
        ]
      });
      gtag('js', new Date());
      gtag('config', '%VITE_GA_ID%', { send_page_view: false });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
